services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: api_erp
      POSTGRES_USER: api_erp
      POSTGRES_PASSWORD: api_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U api_erp -d api_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/api_erp
      DATABASE_USERNAME: api_erp
      DATABASE_PASSWORD: api_erp
      JWT_SECRET: change-this-secret-before-production-change-this-secret
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
    ports:
      - "8080:8080"

volumes:
  postgres_data:
