services:
  # Banco relacional compartilhado por todas as replicas da API.
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: api_erp
      POSTGRES_USER: api_erp
      POSTGRES_PASSWORD: api_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U api_erp -d api_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis compartilhado para blacklist de JWT, rate limit e cache.
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Broker Kafka usado pela API para publicar/consumir eventos.
  kafka:
    image: bitnami/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,INTERNAL://:29092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # API Spring Boot sem porta publicada diretamente; o acesso externo passa pelo Nginx.
  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/api_erp
      DATABASE_USERNAME: api_erp
      DATABASE_PASSWORD: api_erp
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: change-this-secret-before-production-change-this-secret
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
    expose:
      # Porta interna usada pelo Nginx e pelas outras replicas na rede default do Compose.
      - "8080"

  # Reverse proxy e load balancer HTTP exposto para os clientes.
  nginx:
    image: nginx:alpine
    depends_on:
      # Garante que o servico api seja criado antes do Nginx tentar resolver o upstream.
      - api
    ports:
      # Clientes acessam localhost:8080; o Nginx encaminha para as replicas api:8080.
      - "8080:80"
    volumes:
      # Configuracao comentada do upstream e das diretivas de proxy.
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

volumes:
  # Volume persistente do PostgreSQL.
  postgres_data:
