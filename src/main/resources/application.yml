spring:
  application:
    name: API-ERP
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:h2:mem:crm;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        max.block.ms: ${KAFKA_PRODUCER_MAX_BLOCK_MS:2000}
    consumer:
      group-id: api-erp
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: com.devguilhrm.API_ERP.*

server:
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

app:
  bootstrap:
    manager:
      enabled: ${BOOTSTRAP_MANAGER_ENABLED:false}
      name: ${BOOTSTRAP_MANAGER_NAME:Administrador}
      email: ${BOOTSTRAP_MANAGER_EMAIL:}
      password: ${BOOTSTRAP_MANAGER_PASSWORD:}
  cache:
    ttl-minutes: ${CACHE_TTL_MINUTES:5}
  rate-limit:
    login:
      max-attempts: ${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:5}
      window-minutes: ${LOGIN_RATE_LIMIT_WINDOW_MINUTES:15}
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-change-me-dev-secret-key-change-me}
    access-token-expiration-minutes: ${JWT_ACCESS_MINUTES:15}
    refresh-token-expiration-days: ${JWT_REFRESH_DAYS:7}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
