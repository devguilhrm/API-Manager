# Configuracao global do Nginx.
events {
    # Quantidade maxima de conexoes simultaneas por worker.
    worker_connections 1024;
}

http {
    # Tipos MIME padrao do Nginx.
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Compressao para respostas JSON retornadas pela API.
    gzip on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types application/json application/problem+json;

    # Log com endereco/status do upstream para verificar a distribuicao entre replicas.
    log_format upstream_log '$remote_addr - $host "$request" '
                            'status=$status upstream=$upstream_addr upstream_status=$upstream_status';
    access_log /var/log/nginx/access.log upstream_log;

    # Pool de replicas da API resolvidas pelo DNS interno do Docker Compose.
    upstream api_backend {
        # Envia novas requisicoes para a replica com menos conexoes ativas.
        least_conn;

        # O nome do servico api resolve para as replicas criadas com docker compose --scale.
        server api:8080 max_fails=3 fail_timeout=30s;

        # Reaproveita conexoes HTTP com o backend.
        keepalive 32;
    }

    server {
        # Porta interna do Nginx; o Compose publica esta porta como localhost:8080.
        listen 80;
        server_name _;

        # Encaminha todas as rotas, incluindo /api, para a API Spring Boot.
        location / {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;

            # Headers preservam informacoes originais do cliente e do protocolo.
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Mantem conexoes persistentes com o upstream.
            proxy_set_header Connection "";

            # Timeouts de conexao e leitura do backend.
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;

            # Health check passivo: tenta outro upstream em falhas temporarias.
            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 3;
        }
    }
}
